<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>
    <link rel="stylesheet" href="./product-details.css" />
  </head>
  <body>
    <div id="productDetails"></div>

    <script>
      let productId = localStorage.getItem("selectedProductId");

      fetch("https://fakestoreapi.com/products/" + productId)
        .then((res) => res.json())
        .then((product) => {
          let div = document.querySelector("#productDetails");
          div.innerHTML = `
          <h1>${product.title}</h1>
          <img src="${product.image}" alt="${product.title}" style="width:300px;"/>
          <p><strong>Category:</strong> ${product.category}</p>
          <p><strong>Description:</strong> ${product.description}</p>
          <p><strong>Price:</strong> $${product.price}</p>
          <button id = "goBack" onclick="history.back()">Go Back</button>
        `;
        })
        .catch(() => {
          document.querySelector("#productDetails").innerHTML =
            "<p style='color:red'>Error loading product</p>";
        });
    </script>
  </body>
</html>
